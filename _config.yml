# Jekyll 配置文件
# 你的 Github Pages 博客配置

title: "GaussianArtist - 3DGS 技术博客"
description: "3D高斯溅射、点云渲染、计算机图形学技术分享"
baseurl: "" # 子路径，如果你的站点在子目录中
url: "https://chinapdyh.github.io" # 你的域名
github_username: chinapdyh

# 构建设置
markdown: kramdown
permalink: /:year/:month/:day/:title/
highlighter: rouge
kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

# 主题设置
theme: minima
plugins:
  - jekyll-feed

# 自定义设置
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:title/

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - package.json
  - node_modules

# 作者信息
author:
  name: "GaussianArtist"
  email: ""
  github: "chinapdyh"

# 社交链接
social_links:
  github: chinapdyh

# 网站图标
favicon: "/favicon.ico"

# 默认值
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
  - scope:
      path: ""
    values:
      layout: "default"
